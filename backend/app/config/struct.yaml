shared_rules:
  - "只依据给定上下文抽取，不得补造字段，不得使用上下文外知识。"
  - "仅返回 JSON 数组，不要解释、不要 Markdown 代码块、不要额外文本。"
  - "数组最多只能包含一条记录；如果当前上下文中没有任何本表可确认字段，返回 []。"
  - "只能输出当前表定义字段，禁止输出 serial_number、report_id、stock_code、stock_abbr、report_year、report_period、report_type 等身份字段。"
  - "字段口径必须严格按字段中文名称匹配，不能把不同口径字段当成同一个字段。"
  - "目标字段单位必须按字段中文名称中的单位输出：标注万元的字段，如原文单位为元则需要除以 10000；标注元的字段保持元值；标注%的字段只输出百分数值本身，不带百分号。"
  - "若上下文同时出现本期/上年同期、期末/期初、年初至报告期末/上年同期等多列，只能提取与当前报告身份对应的本期或期末值。"
  - "无法确认的字段必须填 null，不要猜测。"

extraction:
  core_window_pages: 5
  statement_window_pages: 6
  default_max_tokens: 32768

